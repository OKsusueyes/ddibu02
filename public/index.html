<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명품 띠부실 메이커 (AI 도트 변환)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 🌟 기존 홈페이지 스타일 코드 시작 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>💾 AI 띠부실 스티커 메이커 v2.0</h1>
            <p>사진을 올리면 AI가 픽셀 아트로 변환해서 띠부실을 만들어줍니다!</p>
        </header>

        <main class="main-content">
            <div class="control-panel">
                <div class="form-group">
                    <label class="custom-file-upload">
                        📁 내 사진 업로드 하기
                        <input type="file" id="imageLoader" accept="image/*">
                    </label>
                    
                    <button id="aiConvertBtn" class="btn-download" style="margin-top: 10px; background: #ff00ff; color: white; border-color: #fff #000 #000 #fff;" disabled>
                        🪄 AI 픽셀 아트로 변환하기
                    </button>
                    <p id="loadingText" style="display: none; color: #000080; font-weight: bold; margin-top: 8px; font-size: 12px; text-align: center;">
                        ⏳ 장인이 한 땀 한 땀 도트를 찍는 중...<br>(약 3~10초 소요)
                    </p>
                </div>

                <div class="form-group">
                    <label for="stickerName">캐릭터/이름 입력</label>
                    <input type="text" id="stickerName" placeholder="예: 픽셀 인영" value="개발매니절">
                </div>

                <div class="form-group">
                    <label for="stickerNo">도감 번호 / 라벨</label>
                    <input type="text" id="stickerNo" placeholder="예: No. 025" value="No. 999">
                </div>

                <div class="form-group">
                    <label for="bgColor">배경 테두리 색상</label>
                    <input type="color" id="bgColor" value="#fce4ec">
                </div>

                <button id="downloadBtn" class="btn-download" disabled>💾 띠부실 다운로드 (.png)</button>
            </div>

            <div class="preview-panel">
                <h3>실시간 미리보기 (1:1 정방형)</h3>
                <div class="canvas-container">
                    <canvas id="stickerCanvas" width="500" height="500"></canvas>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Windows 98 Style UI • Powered by 인영 & 개발매니절</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
